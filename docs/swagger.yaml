info:
  contact: {}
  description: 人事管理后端 API 文档（含 admin/user/chat 等接口）
  title: Gin Backend API
  version: "1.0"
paths:
  /api/admin/account:
    post:
      consumes:
      - application/json
      parameters:
      - description: 账号信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AccountCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APISuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建账号
      tags:
      - account
  /api/admin/account/{id}:
    delete:
      parameters:
      - description: 账号ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APISuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除账号
      tags:
      - account
    put:
      consumes:
      - application/json
      description: 更新角色与状态字段
      parameters:
      - description: 账号ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AccountUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APISuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 更新账号信息
      tags:
      - account
  /api/admin/accounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取账号列表
      tags:
      - account
  /api/admin/ai/analyze/dashboard:
    get:
      description: 对管理员仪表盘生成概览/问题/建议分析
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AIAnalyzeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 管理员 AI 解读仪表盘
      tags:
      - ai
  /api/admin/attendance:
    get:
      parameters:
      - description: 员工编号
        in: query
        name: emp_id
        type: string
      - description: 部门ID
        in: query
        name: dpt_id
        type: integer
      - description: 开始日期(YYYY-MM-DD)
        in: query
        name: start
        type: string
      - description: 结束日期(YYYY-MM-DD)
        in: query
        name: end
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AttendanceListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.APIErrorResponse'
      security:
      - BearerAuth: []
      summary: 管理员查询考勤记录
      tags:
      - attendance
  /api/admin/attendance/{id}:
