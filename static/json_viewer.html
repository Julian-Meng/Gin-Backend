<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>JSON Viewer</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: Consolas, monospace;
            overflow-y: auto;
            padding: 20px;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            background: #111;
            width: 100%;
            padding: 10px 20px;
            box-shadow: 0 0 10px #000;
            z-index: 100;
        }

        #body {
            margin-top: 70px;
        }
    </style>
</head>

<body>

    <div id="header">
        <strong>JSON Viewer</strong>
    </div>

    <div id="body">
        <pre id="json_output">(等待数据…)</pre>
    </div>

    <script>
        const output = document.getElementById("json_output");

        function printJSON(label, data) {
            const time = new Date().toLocaleTimeString();
            output.innerText =
                `# [${time}] ${label}\n` +
                JSON.stringify(data, null, 2) +
                "\n\n" +
                output.innerText;
        }

        // ============ Hook fetch ============
        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            const res = await originalFetch(...args);

            try {
                const clone = res.clone();
                const text = await clone.text();
                try {
                    const json = JSON.parse(text);
                    printJSON(`FETCH ${args[0]}`, json);
                } catch { }
            } catch { }

            return res;
        };

        // ============ Hook XHR ============
        const originalOpen = XMLHttpRequest.prototype.open;
        const originalSend = XMLHttpRequest.prototype.send;

        XMLHttpRequest.prototype.open = function (method, url) {
            this._url = url;
            return originalOpen.apply(this, arguments);
        };

        XMLHttpRequest.prototype.send = function () {
            this.addEventListener("load", () => {
                try {
                    const text = this.responseText;
                    const json = JSON.parse(text);
                    printJSON(`XHR ${this._url}`, json);
                } catch { }
            });
            return originalSend.apply(this, arguments);
        };

        // ============ 继续兼容 postMessage（你原有功能） ============
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "json_output") {
                printJSON("POSTMESSAGE", event.data.payload);
            }
        });
    </script>


</body>

</html>
