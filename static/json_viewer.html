<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>JSON Viewer</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: Consolas, monospace;
            overflow-y: auto;
            padding: 20px;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            background: #111;
            width: 100%;
            padding: 10px 20px;
            box-shadow: 0 0 10px #000;
            z-index: 100;
        }

        #body {
            margin-top: 70px;
        }
    </style>
</head>

<body>

    <div id="header">
        <strong>JSON Viewer（自动接收来自 backend_test.html 的数据）</strong>
    </div>

    <div id="body">
        <pre id="json_output">(等待数据…)</pre>
    </div>

    <script>
        // 监听来自 backend_test.html 的 JSON 数据
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "json_output") {
                document.getElementById("json_output").innerText =
                    JSON.stringify(event.data.payload, null, 2);
            }
        });
    </script>

</body>

</html>
